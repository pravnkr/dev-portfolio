<div>
    <h1 class="display-3 fw-bold mb-3">Skills</h1>
    <div class="row m-auto" style="width: 90%">
        <div class="col-5">
            <div *ngFor="let skill of skillsLeft" class="row mb-1">
                <div class="col-4">
                    <div style="width: 50px; height: 50px">
                        <img
                            [src]="skill.path"
                            [ngClass]="{ 'rounded-circle': skill.circular }"
                            class="img-fluid"
                            alt="..."
                        />
                    </div>
                </div>
                <div class="col">
                    <div class="d-flex flex-column justify-content-between">
                        <div class="d-flex justify-content-between mb-2">
                            <div class="d-flex flex-column">
                                <p class="fw-light skill-name m-0" style="font-size: 0.98rem">
                                    {{ skill.name }}
                                    <br />
                                    <span class="text-grey fw-300">{{ skill.years }} Years</span>
                                </p>
                            </div>
                            <p class="fw-light text-primary">{{ skill.percentage }}%</p>
                        </div>
                        <div class="skill-set-bar position-relative">
                            <div
                                class="filled-bar position-absolute"
                                [ngStyle]="{ width: skill.percentage + '%' }"
                            ></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-2"></div>
        <div class="col-5">
            <div *ngFor="let skill of skillsRight" class="row mb-1">
                <div class="col-4">
                    <div style="width: 50px; height: 50px">
                        <img
                            [src]="skill.path"
                            [ngClass]="{ 'rounded-circle': skill.circular }"
                            class="img-fluid"
                            alt="..."
                        />
                    </div>
                </div>
                <div class="col">
                    <div class="d-flex flex-column justify-content-between">
                        <div class="d-flex justify-content-between mb-2">
                            <div class="d-flex flex-column">
                                <p class="fw-light skill-name m-0" style="font-size: 0.98rem">
                                    {{ skill.name }}
                                    <br />
                                    <span class="text-grey fw-300">{{ skill.years }} Years</span>
                                </p>
                            </div>
                            <p class="fw-light text-primary">{{ skill.percentage }}%</p>
                        </div>
                        <div class="skill-set-bar position-relative">
                            <div
                                class="filled-bar position-absolute"
                                [ngStyle]="{ width: skill.percentage + '%' }"
                            ></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
